coverage:
  status:
    project:
      default:
        target: 60%
        threshold: 3%
    patch:
      default:
        target: 80%

ignore:
  - "cmd/**"
  - "internal/**"
  - "validation/validationhelper/cel.go"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
